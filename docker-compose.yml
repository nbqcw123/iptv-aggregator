# ============================================================
# IPTV 聚合器 - Docker Compose 配置
# ============================================================
# 使用方法:
#   docker compose up -d          # 启动服务
#   docker compose down           # 停止服务
#   docker compose logs -f        # 查看日志
#   docker compose up -d --build  # 重新构建并启动
# ============================================================

version: "3.9"

services:
  # IPTV 聚合器主服务
  iptv-aggregator:
    # 本地构建
    build:
      context: .
      dockerfile: Dockerfile
    # 容器名称
    container_name: iptv-aggregator
    # 端口映射: 宿主机:容器
    ports:
      - "8080:8080"
    # 数据持久化
    volumes:
      - ./data:/data
    # 环境变量
    environment:
      - DB_PATH=/data/iptv.db
    # 重启策略
    restart: unless-stopped
    # 资源限制（可根据 NAS 性能调整）
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
